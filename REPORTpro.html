<!DOCTYPE html>
<html lang="he" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="REPORTpro">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;REPORTpro&quot;,&quot;short_name&quot;:&quot;REPORTpro&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23f1f5f9&quot;,&quot;theme_color&quot;:&quot;%231d4ed8&quot;,&quot;dir&quot;:&quot;rtl&quot;,&quot;lang&quot;:&quot;he&quot;,&quot;start_url&quot;:&quot;.&quot;}">
<title>REPORTpro · פיקוח עליון ובקרה הנדסית</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&amp;family=Rubik:wght@500;600;700;800&amp;display=swap">
<style>
  :root{
    --blue:#1d4ed8; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --bg:#f1f5f9; --card:#fff;
    --font-body:'Heebo',system-ui,-apple-system,sans-serif;
    --font-head:'Rubik',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--ink);direction:rtl;-webkit-text-size-adjust:100%}
  button{font-family:var(--font-body);cursor:pointer}
  input,textarea,select{font-family:var(--font-body)}
  .hidden{display:none!important}

  header{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .h-inner{max-width:920px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;background:none;border:none;padding:0}
  .tri{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#dc2626,#b91c1c);display:flex;align-items:center;justify-content:center}
  .brand-name{font-family:var(--font-head);font-weight:800;font-size:16px;line-height:1.2;text-align:right;color:var(--ink)}
  .brand-sub-inline{font-weight:600;font-size:13px;color:var(--muted)}
  .brand-sub{font-size:11px;color:var(--muted);text-align:right}
  .h-right{display:flex;align-items:center;gap:8px}
  .link-btn{display:flex;align-items:center;gap:6px;background:#f1f5f9;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;color:#334155}
  .flash{display:none;align-items:center;gap:4px;color:#16a34a;font-size:13px;font-weight:700;background:#f0fdf4;padding:5px 10px;border-radius:8px}
  .flash.show{display:flex}

  .container{max-width:920px;margin:0 auto;padding:20px 14px;padding-bottom:calc(120px + env(safe-area-inset-bottom))}

  .list-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .page-title{font-family:var(--font-head);font-size:26px;font-weight:800;margin:0}
  .page-sub{color:var(--muted);margin:4px 0 0;font-size:14px}
  .btn-primary{display:inline-flex;align-items:center;gap:7px;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:15px;font-weight:700;box-shadow:0 2px 8px rgba(29,78,216,.25)}
  .btn-ghost-sm{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:13.5px;font-weight:700;color:#334155}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

  /* folder chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:18px;-webkit-overflow-scrolling:touch}
  .chip{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:8px 14px;font-size:13.5px;font-weight:700;color:#334155;flex-shrink:0}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .chip .cnt{font-size:11px;opacity:.7}
  .chip-add{border-style:dashed;color:var(--blue);border-color:#bfdbfe}

  .empty{text-align:center;padding:60px 20px;background:#fff;border-radius:14px;border:1px dashed #cbd5e1}
  .empty p{margin:12px 0 0;color:var(--muted);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{position:relative;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;cursor:pointer;transition:box-shadow .15s,transform .12s,background .15s}
  .card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1)}
  .card-selected{border:2.5px solid var(--blue);background:#eff6ff;box-shadow:0 0 0 4px rgba(29,78,216,.2),0 6px 18px rgba(29,78,216,.22)}
  .card-selected .card-title{color:var(--blue)}
  .card-check{position:absolute;top:10px;inset-inline-end:10px;z-index:2;width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(29,78,216,.4)}
  .card-check svg{width:18px;height:18px}
  .sel-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;color:#fff;background:var(--blue);padding:2px 8px;border-radius:20px;vertical-align:middle}
  .sel-badge svg{width:12px;height:12px}
  .card-accent{width:5px;background:var(--blue)}
  .card-body{padding:16px 18px;flex:1;min-width:0}
  .card-title{font-family:var(--font-head);font-weight:700;font-size:15.5px;line-height:1.3;margin-bottom:8px}
  .card-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .card-meta span{display:inline-flex;align-items:center;gap:4px}
  .card-tpl{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#475569;margin-bottom:10px;font-weight:600}
  .card-tpl .sw{width:11px;height:11px;border-radius:3px}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .pill{font-size:11.5px;font-weight:600;background:#f1f5f9;color:#475569;padding:3px 9px;border-radius:20px;border:1px solid var(--line)}
  .pill.high{background:#fef2f2;color:#dc2626;border-color:#fecaca}
  .card-folder-row{display:flex;align-items:center;gap:6px;margin-bottom:12px}
  .mini-sel{font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:#f8fafc;color:#475569;max-width:100%}
  .card-actions{display:flex;gap:6px;align-items:center}
  .card-edit{flex:1;background:#eff6ff;color:var(--blue);border:1px solid #bfdbfe;border-radius:8px;padding:8px;font-weight:700;font-size:13.5px}
  .icon-sq{background:#f8fafc;border:1px solid var(--line);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#475569}
  .icon-sq.danger{color:#dc2626}

  .section{background:#fff;border-radius:14px;border:1px solid var(--line);padding:16px 16px 18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .sec-head{display:flex;align-items:center;gap:9px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #f1f5f9}
  .sec-icon{width:32px;height:32px;border-radius:8px;background:#eff6ff;color:var(--blue);display:flex;align-items:center;justify-content:center}
  .sec-title{font-family:var(--font-head);font-size:17px;font-weight:700;margin:0}
  .field-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .full{grid-column:1/-1}
  label.lbl{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:#475569;margin-bottom:6px}
  .input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14.5px;background:#fff;color:var(--ink);outline:none}
  .input:focus{border-color:var(--blue)}
  textarea.input{min-height:70px;resize:vertical}
  select.input{cursor:pointer}

  .zone{background:#fff;border-radius:14px;border:1px solid var(--line);margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden}
  .zone-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8fafc;border-bottom:1px solid #eef2f7}
  .zone-num{width:28px;height:28px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
  .zone-title-input{flex:1;border:none;background:transparent;font-size:15.5px;font-weight:700;font-family:var(--font-head);color:var(--ink);outline:none;min-width:0}
  .zone-acts{display:flex;gap:4px}
  .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;color:#475569}
  .icon-btn:disabled{opacity:.35}
  .icon-btn.danger{color:#dc2626}
  .zone-body{padding:4px 14px 14px}

  .defect{display:flex;gap:12px;padding:14px 0;border-bottom:1px dashed #e8edf3}
  .defect-num{font-family:var(--font-head);font-weight:800;color:var(--blue);font-size:14px;min-width:34px;padding-top:4px}
  .img-col{width:130px;flex-shrink:0}
  .img-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .thumb{width:100%;height:110px;object-fit:cover;display:block}
  .img-remove{position:absolute;top:5px;inset-inline-end:5px;width:24px;height:24px;border-radius:50%;background:rgba(15,23,42,.7);color:#fff;border:none;display:flex;align-items:center;justify-content:center}
  .img-ph{height:110px;border-radius:10px;border:1.5px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#cbd5e1;font-size:12px}
  .img-btns{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .img-btn{flex:1 1 calc(50% - 3px)}
  .img-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;font-size:11.5px;font-weight:600;padding:6px 4px;border:1px solid var(--line);border-radius:7px;background:#fff;color:#334155}
  .defect-body{flex:1;min-width:0}
  .tags-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tags-lbl{font-size:12px;font-weight:700;color:var(--muted)}
  .tag{font-size:12.5px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-weight:600}
  .tag.active{font-weight:700}
  .sel{padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13.5px;background:#fff}
  .del-defect{margin-top:10px;display:flex;align-items:center;gap:5px;font-size:12.5px;color:#dc2626;background:none;border:none;padding:0;font-weight:600}
  .add-defect{display:flex;align-items:center;gap:6px;margin-top:14px;padding:9px 14px;background:#eff6ff;color:var(--blue);border:1.5px dashed #bfdbfe;border-radius:9px;font-weight:700;font-size:13.5px;width:100%;justify-content:center}
  .add-zone{display:flex;align-items:center;gap:7px;justify-content:center;width:100%;padding:13px;background:#fff;color:var(--blue);border:2px dashed var(--blue);border-radius:12px;font-weight:700;font-size:15px;margin-bottom:16px}

  .action-bar{position:fixed;bottom:0;inset-inline:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom));z-index:20}
  .action-bar-inner{max-width:920px;margin:0 auto;display:flex;gap:10px;width:100%}
  .btn-save{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#0f172a;color:#fff;border:none;border-radius:11px;padding:13px;font-weight:700;font-size:15px}
  .btn-print{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--blue);color:#fff;border:none;border-radius:11px;padding:13px;font-weight:700;font-size:15px}

  /* templates */
  .tpl-card{background:#fff;border-radius:14px;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden}
  .tpl-preview{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .tpl-logo{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
  .tpl-logo img{width:100%;height:100%;object-fit:contain}
  .tpl-company{font-family:var(--font-head);font-weight:800;font-size:16px}
  .tpl-sub{font-size:11px;color:var(--muted)}
  .tpl-meta{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .tpl-name{font-weight:700;font-size:13.5px}
  .tpl-swatches{display:flex;gap:5px}
  .tpl-sw{width:18px;height:18px;border-radius:5px;border:1px solid rgba(0,0,0,.1)}
  .tpl-actions{display:flex;gap:6px;padding:0 16px 16px}
  .color-field{display:flex;align-items:center;gap:10px}
  .color-field input[type=color]{width:46px;height:40px;border:1px solid var(--line);border-radius:8px;padding:2px;background:#fff;cursor:pointer}
  .logo-upload{display:flex;align-items:center;gap:12px}
  .logo-prev{width:64px;height:64px;border-radius:12px;border:1.5px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;background:#f8fafc;overflow:hidden;flex-shrink:0}
  .logo-prev img{width:100%;height:100%;object-fit:contain}

  /* print doc */
  .print-toolbar{display:flex;justify-content:space-between;margin-bottom:16px;gap:10px}
  .print-doc{background:#fff;max-width:760px;margin:0 auto;padding:36px;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .doc-header{display:flex;padding-bottom:14px;border-bottom:3px solid var(--blue)}
  .doc-logo{display:flex;align-items:center;gap:12px}
  .doc-tri{width:74px;height:74px;border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
  .doc-tri img{width:100%;height:100%;object-fit:contain}
  .doc-tri svg{width:60%;height:60%}
  .doc-company{font-family:var(--font-head);font-weight:800;font-size:20px}
  .doc-company-sub{font-size:11.5px;color:#475569}
  .doc-title-box{border:2px solid var(--blue);border-radius:10px;padding:16px;margin:20px 0;text-align:center}
  .doc-title{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--blue);margin:0}
  .meta-table{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:12px}
  .meta-row{display:flex;border-bottom:1px solid #eef2f7}
  .meta-row:last-child{border-bottom:none}
  .meta-cell{flex:1;padding:9px 14px;font-size:13.5px}
  .meta-key{font-weight:700;color:var(--blue)}
  .doc-note{font-size:13px;color:#334155;padding:8px 4px;line-height:1.6}
  .doc-zone{margin-top:20px;break-inside:avoid}
  .doc-zone-title{font-family:var(--font-head);font-size:17px;font-weight:700;color:var(--blue);border-bottom:2px solid #f1f5f9;padding-bottom:6px;margin-bottom:6px}
  .doc-defect{display:flex;gap:16px;padding:14px 0;border-bottom:1px dashed #e8edf3;break-inside:avoid;align-items:flex-start}
  .doc-img{width:200px;height:160px;object-fit:cover;border-radius:10px;flex-shrink:0;border:1px solid var(--line)}
  .doc-img-empty{width:200px;height:30px;flex-shrink:0}
  .doc-defect-text{flex:1;padding-top:4px}
  .doc-defect-desc{font-size:14.5px;line-height:1.6;margin:0;color:#1e293b}
  .doc-defect-num{font-family:var(--font-head);font-weight:800;color:var(--blue);margin-inline-end:8px}
  .doc-tags{display:flex;gap:8px;margin-top:10px}
  .doc-tag{font-size:12px;font-weight:700;padding:4px 12px;border-radius:8px;border:1.5px solid}
  .doc-summary{margin-top:28px;border:2px solid var(--blue);border-radius:10px;padding:20px;break-inside:avoid}
  .doc-summary-title{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--blue);text-align:center;margin:0 0 12px}
  .doc-signwrap{margin-top:30px;text-align:left;break-inside:avoid}
  .doc-sign{display:inline-block;text-align:left}
  .doc-sign-name{font-family:var(--font-head);font-weight:700;font-size:15px}
  .doc-sign-line{font-size:12.5px;color:#475569}
  .doc-footer{text-align:center;font-size:11.5px;color:#94a3b8;margin-top:20px;padding-top:14px;border-top:2px solid var(--blue)}

  @media print{
    html,body{height:auto!important}
    body{background:#fff}
    header,.action-bar,.print-toolbar,.no-print{display:none!important}
    .container{padding:0;max-width:100%}
    .print-doc{box-shadow:none;margin:0;max-width:100%;padding:0;border-radius:0}
    /* מניעת עמוד ריק בסוף: ביטול מרווחים תחתונים בסוף המסמך */
    .doc-signwrap{margin-top:22px}
    .doc-footer{margin-top:12px;padding-top:10px;margin-bottom:0}
    .print-doc>*:last-child{margin-bottom:0!important}
    .container>*:last-child,.container{margin-bottom:0!important}
    @page{
      margin:16mm 14mm 16mm;
      @bottom-center{ content:"עמוד " counter(page) " / " counter(pages); font-family:'Heebo',sans-serif; font-size:10px; color:#94a3b8; }
    }
  }
  @media(max-width:560px){
    .img-col{width:108px}
    .doc-img{width:130px;height:104px}
  }
</style>
</head>
<body>
<header>
  <div class="h-inner">
    <button class="brand" onclick="go('home')">
      <span class="brand-name">REPORTpro - <span class="brand-sub-inline">פיקוח עליון ובקרה הנדסית</span></span>
    </button>
    <div class="h-right">
      <span class="flash" id="flash">✓ נשמר</span>
      <button class="link-btn" id="verBtn" onclick="showChangelog()" title="היסטוריית גרסאות">v1.21.0</button>
      <button class="link-btn hidden" id="homeBtn" onclick="go('home')">בית</button>
    </div>
  </div>
</header>

<div class="container" id="app"></div>

<input type="file" id="fileInput" accept="image/*" hidden="">
<input type="file" id="camInput" accept="image/*" capture="environment" hidden="">
<input type="file" id="importInput" accept="application/json" hidden="">
<input type="file" id="logoInput" accept="image/*" hidden="">
<input type="file" id="sigInput" accept="image/*" hidden="">

<script>
/* ============================================================
   REPORTpro — מערכת דוחות פיקוח עליון ובקרה הנדסית (עצמאית)
   תכונות: תבניות גרפיות · תיקיות/פרויקטים · ארכיון · תמונות · PDF
   ============================================================ */

/* ===== מספר גרסה — מתקדם בכל עדכון ===== */
const APP_VERSION="1.21.0";
const CHANGELOG=[
  {v:"1.21.0",d:"עמידות לפתיחה מקובץ מקומי: האפליקציה נטענת גם כשהאחסון חסום (מצב ללא שמירה אוטומטית עם גיבוי/שחזור)"},
  {v:"1.20.1",d:"מניעת עמוד אחרון ריק ב-PDF — המסמך מסתיים אחרי החתימה"},
  {v:"1.20.0",d:"בלוק החתימה ופרטי המהנדס ממוקמים בפינה השמאלית-תחתונה של הדוח"},
  {v:"1.19.2",d:"תיקון ניסוח: 'הצעות תפוצה' שונה ל'תפוצה'"},
  {v:"1.19.1",d:"סימון דוח נבחר בארכיון בולט יותר: לחיצה על כרטיס לסימון, רקע מודגש, מסגרת וסמן פינתי"},
  {v:"1.19.0",d:"מיקום לוגו בתבנית (UI), כותרת משנה רב-שורתית, וסימון ויזואלי של הדוח הנבחר בארכיון"},
  {v:"1.18.0",d:"שמירת דוח בודד כקובץ HTML עצמאי במיקום לבחירה במחשב (כולל תמונות)"},

// ---------- IndexedDB ----------
const memStore={reports:{},folders:{},templates:{}};
const DB={ _db:null, broken:false, _opened:false,
  open(){return new Promise((res)=>{
    if(this._opened)return res(this._db);
    let settled=false;
    const done=(db,broken)=>{if(settled)return;settled=true;this._opened=true;this._db=db;this.broken=!!broken;clearTimeout(to);res(db);};
    const to=setTimeout(()=>done(null,true),2500); // אם האחסון לא נפתח תוך 2.5 שניות — עוברים לזיכרון
    try{
      if(typeof indexedDB==="undefined")return done(null,true);
      const r=indexedDB.open("carmin_reports",2);
      r.onupgradeneeded=e=>{const db=e.target.result;
        if(!db.objectStoreNames.contains("reports"))db.createObjectStore("reports",{keyPath:"id"});
        if(!db.objectStoreNames.contains("folders"))db.createObjectStore("folders",{keyPath:"id"});
        if(!db.objectStoreNames.contains("templates"))db.createObjectStore("templates",{keyPath:"id"});
      };
      r.onsuccess=e=>done(e.target.result,false);
      r.onerror=()=>done(null,true);
      r.onblocked=()=>done(null,true);
    }catch(e){done(null,true);}
  });},
  async all(store){const db=await this.open();
    if(!db||this.broken)return Object.values(memStore[store]).map(x=>JSON.parse(JSON.stringify(x)));
    try{return await new Promise((res,rej)=>{const rq=db.transaction(store,"readonly").objectStore(store).getAll();rq.onsuccess=()=>res(rq.result||[]);rq.onerror=rej;});}
    catch(e){this.broken=true;return Object.values(memStore[store]).map(x=>JSON.parse(JSON.stringify(x)));}
  },
  async put(store,obj){memStore[store][obj.id]=JSON.parse(JSON.stringify(obj));const db=await this.open();
    if(!db||this.broken)return;
    try{return await new Promise((res,rej)=>{const tx=db.transaction(store,"readwrite");tx.objectStore(store).put(obj);tx.oncomplete=res;tx.onerror=rej;});}
    catch(e){this.broken=true;}
  },
  async del(store,id){delete memStore[store][id];const db=await this.open();
    if(!db||this.broken)return;
    try{return await new Promise((res,rej)=>{const tx=db.transaction(store,"readwrite");tx.objectStore(store).delete(id);tx.oncomplete=res;tx.onerror=rej;});}
    catch(e){this.broken=true;}
  },
};

function compressImage(file,maxDim=1400,quality=0.72){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=()=>rej(new Error("read"));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>rej(new Error("decode"));
      img.onload=()=>{
        try{
          let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
          if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
          else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
          const c=document.createElement("canvas");c.width=w;c.height=h;
          const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);
          ctx.drawImage(img,0,0,w,h);
          res(c.toDataURL("image/jpeg",quality));
        }catch(err){rej(err);}
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

      <button class="btn-ghost-sm" onclick="recolorFolder('${activeFolder.id}')">${I.palette} צבע</button>
      <button class="btn-ghost-sm" style="color:#dc2626" onclick="delFolder('${activeFolder.id}')">${I.trash} מחק תיקייה</button>
    </div>`:`
    <div class="toolbar">
      <button class="btn-ghost-sm" onclick="go('templates')">${I.palette} תבניות גרפיות</button>
      <button class="btn-ghost-sm" onclick="shareMenu()">${I.share} שתף</button>
      <button class="btn-ghost-sm" onclick="downloadApp()">${I.download} הורד קובץ</button>
      <button class="btn-ghost-sm" onclick="exportData()">${I.download} גיבוי</button>
      <button class="btn-ghost-sm" onclick="document.getElementById('importInput').click()">${I.upload} שחזור</button>
    </div>`;

  const cards=list.map(r=>{
    const dc=r.zones.reduce((s,z)=>s+z.defects.length,0);
    const hc=r.zones.reduce((s,z)=>s+z.defects.filter(d=>d.severity==="high").length,0);
    const tpl=tplOf(r.templateId);
    const folderOpts=`<option value="">ללא תיקייה</option>`+state.folders.map(f=>`<option value="${f.id}" ${r.folderId===f.id?"selected":""}>${esc(f.name)}</option>`).join("");
    const sel=(state.selectedReportId===r.id);
    return `<div class="card${sel?' card-selected':''}" onclick="selectReport('${r.id}')">
      ${sel?`<div class="card-check">${I.check}</div>`:""}
      <div class="card-accent" style="background:${tpl.primaryColor}"></div><div class="card-body">
      <div class="card-title">${esc(r.title)}</div>
      <div class="card-meta"><span>${I.cal} ${esc(r.date)}</span>${r.location?`<span>${I.pin} ${esc(r.location)}</span>`:""}</div>
      <div class="card-tpl"><span class="sw" style="background:${tpl.primaryColor}"></span>${esc(tpl.company)}</div>
      <div class="pills"><span class="pill">${r.zones.length} אזורים</span><span class="pill">${dc} ליקויים</span>${hc>0?`<span class="pill high">${hc} חמורים</span>`:""}</div>
      <div class="card-folder-row" onclick="event.stopPropagation()">${I.folder}<select class="mini-sel" onchange="moveToFolder('${r.id}',this.value)">${folderOpts}</select></div>

        <button class="card-edit" onclick="editReport('${r.id}')">עריכה</button>

        <button class="icon-sq danger" onclick="delReport('${r.id}')">${I.trash}</button>
      </div></div></div>`;
  }).join("");

  return `
  <div class="list-top">
    <div><h1 class="page-title">${activeFolder?esc(activeFolder.name):"ארכיון דוחות"}</h1>

    : `<div class="grid">${cards}</div>`}

function selFolder(id){state.activeFolderId=id;render();}
async function addFolder(){
  const name=prompt("שם התיקייה (פרויקט / ארגון):");
  if(!name)return;
  const color=FOLDER_COLORS[state.folders.length%FOLDER_COLORS.length];
  const f={id:uid(),name:name.trim(),color,createdAt:Date.now()};
  await DB.put("folders",f);state.folders.push(f);state.activeFolderId=f.id;render();
}
async function renameFolder(id){const f=folderOf(id);const n=prompt("שם חדש:",f.name);if(!n)return;f.name=n.trim();await DB.put("folders",f);render();}
async function recolorFolder(id){
  const f=folderOf(id);
  const idx=FOLDER_COLORS.indexOf(f.color);
  f.color=FOLDER_COLORS[(idx+1)%FOLDER_COLORS.length];
  await DB.put("folders",f);render();
}
async function delFolder(id){
  if(!confirm("למחוק את התיקייה? הדוחות יישארו (יעברו ל'ללא תיקייה')."))return;
  for(const r of state.reports.filter(r=>r.folderId===id)){r.folderId=null;await DB.put("reports",r);}
  await DB.del("folders",id);
  state.folders=state.folders.filter(f=>f.id!==id);state.activeFolderId=null;render();
}
async function moveToFolder(rid,fid){
  const r=state.reports.find(x=>x.id===rid);if(!r)return;
  r.folderId=fid||null;r.updatedAt=Date.now();await DB.put("reports",r);
  // אם מסננים לפי תיקייה והדוח עזב — רענון
  render();
}

function selectReport(id){state.selectedReportId=(state.selectedReportId===id?null:id);render();}
function newReport(){state.current=blankReport();state.selectedReportId=state.current.id;go("edit");}
function editReport(id){state.current=JSON.parse(JSON.stringify(state.reports.find(r=>r.id===id)));state.selectedReportId=id;go("edit");}
function printReport(id){state.current=JSON.parse(JSON.stringify(state.reports.find(r=>r.id===id)));state.selectedReportId=id;go("print");}
async function dupReport(id){const c=JSON.parse(JSON.stringify(state.reports.find(r=>r.id===id)));c.id=uid();c.createdAt=Date.now();c.title+=" (עותק)";await DB.put("reports",c);state.reports.unshift(c);render();}
async function delReport(id){if(!confirm("למחוק את הדוח?"))return;await DB.del("reports",id);state.reports=state.reports.filter(r=>r.id!==id);render();}

async function persist(){
  state.current.updatedAt=Date.now();
  // ניקוי דגלים זמניים שלא צריכים להישמר
  state.current.zones.forEach(z=>z.defects.forEach(d=>{delete d._busy;}));
  await DB.put("reports",JSON.parse(JSON.stringify(state.current)));
  const others=state.reports.filter(r=>r.id!==state.current.id);
  state.reports=[JSON.parse(JSON.stringify(state.current)),...others].sort((a,b)=>b.updatedAt-a.updatedAt);
  maybeRemindBackup();
  flash();
}
// תזכורת גיבוי אחרי כמה שמירות (רשת ביטחון בשטח)
function maybeRemindBackup(){
  try{
    let n=parseInt(sessionStorage.getItem("saveCount")||"0",10)+1;
    sessionStorage.setItem("saveCount",String(n));
    if(n%5===0){
      setTimeout(()=>{ if(confirm("שמרת כמה דוחות. מומלץ לגבות עכשיו לקובץ כדי לא לאבד נתונים. לגבות?")) exportData(); },300);
    }
  }catch(e){}
}

function zoneHTML(z,zi,total){
  return `<div class="zone" data-zid="${z.id}">
    <div class="zone-head">
      <span class="zone-num">${zi+1}</span>
      <input class="zone-title-input" data-zfield="title" value="${esc(z.title)}" placeholder="כותרת אזור (לדוגמה: הרצל - סעדיה גאון)">
      <div class="zone-acts">
        <button class="icon-btn" ${zi===0?"disabled":""} onclick="moveZone(${zi},-1)">${I.up}</button>
        <button class="icon-btn" ${zi===total-1?"disabled":""} onclick="moveZone(${zi},1)">${I.down}</button>
        <button class="icon-btn danger" onclick="delZone('${z.id}')">${I.trash}</button>
      </div>
    </div>
    <div class="zone-body">
      ${z.defects.map((d,di)=>defectHTML(z.id,d,zi,di,z.defects.length)).join("")}
      <button class="add-defect" onclick="addDefect('${z.id}')">${I.plus} הוסף ליקוי</button>
    </div>
  </div>`;
}
function defectHTML(zid,d,zi,di,total){
  const sevTags=SEVERITIES.map(s=>{const a=d.severity===s.id;const st=a?`background:${s.bg};color:${s.color};border-color:${s.border}`:"";return `<button class="tag${a?' active':''}" style="${st}" onclick="toggleSev('${zid}','${d.id}','${s.id}')">${s.label}</button>`;}).join("");
  const cats=`<option value="">— ללא —</option>`+CATEGORIES.map(c=>`<option value="${c}" ${d.category===c?"selected":""}>${c}</option>`).join("");
  return `<div class="defect" data-did="${d.id}">
    <div class="defect-num">${zi+1}.${di+1}</div>
    <div class="img-col" ondragover="event.preventDefault();this.style.outline='2px dashed var(--blue)';this.style.outlineOffset='3px'" ondragleave="this.style.outline='none'" ondrop="this.style.outline='none';dropImg(event,'${zid}','${d.id}')">
      ${d._busy?`<div class="img-ph">מעבד תמונה…</div>`:(d.image?`<div class="img-wrap"><img class="thumb" style="object-fit:${(state.current.imageFit||'contain')==='cover'?'cover':'contain'};background:#f1f5f9" src="${d.image}"><button class="img-remove" onclick="clearImg('${zid}','${d.id}')">${I.x}</button></div>`:`<div class="img-ph">${I.imgBig}</div>`)}
      <div class="img-btns">
        <button class="img-btn" ${d._busy?"disabled":""} onclick="pickImg('${zid}','${d.id}',true)">${I.cam} צלם</button>
        <button class="img-btn" ${d._busy?"disabled":""} onclick="pickImg('${zid}','${d.id}',false)">${I.img} גלריה</button>
        <button class="img-btn" ${d._busy?"disabled":""} onclick="pasteImg('${zid}','${d.id}')">${I.paste} הדבק</button>
      </div>
    </div>
    <div class="defect-body">
      <textarea class="input" data-dfield="description" placeholder="תיאור הליקוי…">${esc(d.description)}</textarea>
      <div class="tags-row"><span class="tags-lbl">חומרה:</span>${sevTags}</div>
      <div class="tags-row"><span class="tags-lbl">קטגוריה:</span><select class="sel" data-dfield="category">${cats}</select></div>
      ${total>1?`<button class="del-defect" onclick="delDefect('${zid}','${d.id}')">${I.trash} מחק ליקוי</button>`:""}
    </div>
  </div>`;
}
function bindEdit(){
  const r=state.current;
  document.querySelectorAll('[data-f]').forEach(el=>{
    const ev=el.tagName==="SELECT"?'change':'input';
    el.addEventListener(ev,()=>{
      r[el.dataset.f]=(el.dataset.f==="folderId"&&el.value==="")?null:el.value;
      if(el.dataset.f==="imageFit")render();
    });
  });
  document.querySelectorAll('.zone').forEach(zEl=>{
    const z=r.zones.find(x=>x.id===zEl.dataset.zid);
    zEl.querySelectorAll('[data-zfield]').forEach(el=>el.addEventListener('input',()=>{z[el.dataset.zfield]=el.value;}));
    zEl.querySelectorAll('.defect').forEach(dEl=>{
      const d=z.defects.find(x=>x.id===dEl.dataset.did);
      dEl.querySelectorAll('[data-dfield]').forEach(el=>{const ev=el.tagName==="SELECT"?'change':'input';el.addEventListener(ev,()=>{d[el.dataset.dfield]=el.value;});});
    });
  });
}
function findZone(zid){return state.current.zones.find(z=>z.id===zid);}
function addZone(){state.current.zones.push(blankZone());render();}
function delZone(zid){state.current.zones=state.current.zones.filter(z=>z.id!==zid);if(!state.current.zones.length)state.current.zones.push(blankZone());render();}
function moveZone(i,dir){const a=state.current.zones,j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];render();}
function addDefect(zid){findZone(zid).defects.push(blankDefect());render();}
function delDefect(zid,did){const z=findZone(zid);z.defects=z.defects.filter(d=>d.id!==did);render();}
function toggleSev(zid,did,sid){const d=findZone(zid).defects.find(x=>x.id===did);d.severity=d.severity===sid?"":sid;render();}
function clearImg(zid,did){findZone(zid).defects.find(x=>x.id===did).image="";render();}
function pickImg(zid,did,cam){pendingImg={zid,did};document.getElementById(cam?"camInput":"fileInput").click();}
async function handleFile(input){
  const file=input.files&&input.files[0];input.value="";
  if(!file||!pendingImg)return;
  const d=findZone(pendingImg.zid).defects.find(x=>x.id===pendingImg.did);
  const pend=pendingImg;pendingImg=null;
  if(!d)return;
  d._busy=true;render();
  try{
    const data=await compressImage(file);
    const dd=findZone(pend.zid).defects.find(x=>x.id===pend.did);
    if(dd){dd.image=data;dd._busy=false;}
  }catch(err){
    const dd=findZone(pend.zid).defects.find(x=>x.id===pend.did);
    if(dd)dd._busy=false;
    alert("לא ניתן היה לעבד את התמונה. נסה שוב או בחר תמונה אחרת.");
  }
  render();
}
document.getElementById("fileInput").addEventListener("change",e=>handleFile(e.target));
document.getElementById("camInput").addEventListener("change",e=>handleFile(e.target));

// ---------- הדבקת תמונה מהלוח ----------
let pasteTarget=null;
async function applyPaste(blob,zid,did){
  const z=findZone(zid);const d=z&&z.defects.find(x=>x.id===did);
  if(!d)return;
  d._busy=true;render();
  try{
    const file=new File([blob],"paste.png",{type:blob.type||"image/png"});
    const data=await compressImage(file);
    const dd=findZone(zid).defects.find(x=>x.id===did);
    if(dd){dd.image=data;dd._busy=false;}
  }catch(err){
    const dd=findZone(zid).defects.find(x=>x.id===did);if(dd)dd._busy=false;
    alert("לא ניתן היה לעבד את התמונה שהודבקה.");
  }
  render();
}
function pasteImg(zid,did){
  // ללא בקשת הרשאה: רק מסמנים יעד; ההדבקה מתבצעת ב-Ctrl/Cmd+V (לא דורש אישור דפדפן)
  pasteTarget={zid,did};
  showPasteHint();
}
let pasteHintEl=null;
function showPasteHint(){
  if(pasteHintEl)pasteHintEl.remove();
  const isMac=/Mac|iPhone|iPad/.test(navigator.platform||navigator.userAgent);
  pasteHintEl=document.createElement("div");
  pasteHintEl.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:11px 18px;border-radius:12px;font-family:var(--font-body);font-size:14px;font-weight:700;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px";
  pasteHintEl.innerHTML=(isMac?"⌘V":"Ctrl+V")+" כדי להדביק את התמונה";
  document.body.appendChild(pasteHintEl);
  clearTimeout(showPasteHint._t);
  showPasteHint._t=setTimeout(()=>{if(pasteHintEl){pasteHintEl.remove();pasteHintEl=null;}},6000);
}
function hidePasteHint(){if(pasteHintEl){pasteHintEl.remove();pasteHintEl=null;}}
function dropImg(e,zid,did){
  e.preventDefault();
  const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f&&f.type&&f.type.startsWith("image/"))applyPaste(f,zid,did);
}
// מאזין גלובלי: Ctrl/Cmd+V מדביק לליקוי שנבחר
document.addEventListener("paste",e=>{
  // הדבקת לוגו בעורך התבנית
  if(state.view==="templateEdit"&&logoPasteArmed){
    const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
    for(const it of items){
      if(it.type&&it.type.startsWith("image/")){
        const blob=it.getAsFile();
        if(blob){e.preventDefault();hidePasteHint();logoPasteArmed=false;applyLogoImage(blob);}
        return;
      }
    }
    return;
  }
  if(state.view!=="edit")return;
  const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  for(const it of items){
    if(it.type&&it.type.startsWith("image/")){
      const blob=it.getAsFile();
      if(blob){
        e.preventDefault();hidePasteHint();
        const tgt=pasteTarget||lastDefectTarget();
        if(!tgt){alert("בחר קודם ליקוי (לחץ על 'הדבק' בליקוי הרצוי) ואז הדבק.");return;}
        pasteTarget=null;applyPaste(blob,tgt.zid,tgt.did);
      }
      return;
    }
  }
});

async function delTemplate(id){

  for(const r of state.reports.filter(r=>r.templateId===id)){r.templateId=fb;await DB.put("reports",r);}

}

function onLogoSize(v){
  state.currentTpl.logoSize=parseInt(v,10);

function onSigSize(v){
  state.currentTpl.signatureSize=parseInt(v,10);
  document.getElementById('sigSizeVal').textContent=v;
  const el=document.getElementById('prevSig');if(el)el.style.maxHeight=v+'px';
}
function logoLayoutStyle(pos){
  if(pos==="left")return "flex-direction:row-reverse";
  if(pos==="center")return "flex-direction:column;align-items:center;text-align:center";
  return ""; // right (ברירת מחדל)
}
function setLogoPos(pos){state.currentTpl.logoPosition=pos;render();bindTemplateEdit();}
function bindTemplateEdit(){
  const t=state.currentTpl;
  document.querySelectorAll('[data-t]').forEach(el=>{
    if(el.type==="range")return; // סליידרים מטופלים ב-oninput ישיר
    el.addEventListener('input',()=>{
      const key=el.dataset.t,val=el.value;
      t[key]=val;
      // סנכרון שדות מקושרים (בורר צבע + שדה טקסט עם אותו data-t) ללא רינדור
      document.querySelectorAll('[data-t="'+key+'"]').forEach(other=>{if(other!==el)other.value=val;});
      // עדכון התצוגה המקדימה ישירות — בלי לבנות מחדש את הטופס (לא מאבד פוקוס)
      const company=document.getElementById('prevCompany');
      const sub=document.getElementById('prevSub');
      const header=document.getElementById('prevHeader');
      const logo=document.getElementById('prevLogo');
      if(key==="company"&&company)company.textContent=val;
      if(key==="companySub"&&sub)sub.innerHTML=escMulti(val);
      if(key==="primaryColor"&&header)header.style.setProperty('--blue',val);
      if(key==="accentColor"){
        if(company)company.style.color=val;
        if(logo&&!t.logo)logo.style.background='linear-gradient(135deg,'+val+','+val+')';
      }
    });
  });
}
async function saveTemplate(){await DB.put("templates",JSON.parse(JSON.stringify(state.currentTpl)));const others=state.templates.filter(t=>t.id!==state.currentTpl.id);state.templates=[...others,JSON.parse(JSON.stringify(state.currentTpl))];flash();go("templates");}

async function applyLogoImage(file){
  if(!file||!state.currentTpl||!file.type||!file.type.startsWith("image/"))return;
  state.currentTpl.logo=await compressImage(file,400,0.85);render();bindTemplateEdit();

function dropLogo(e){
  e.preventDefault();
  const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f)applyLogoImage(f);
}

function exportData(){
  const data={reports:state.reports,folders:state.folders,templates:state.templates};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="carmin-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(a.href);
}

// ---------- שיתוף ----------
function shareMenu(){
  const c=confirm("מה לשתף?\n\nאישור = שיתוף האפליקציה (כדי שעמיתים ישתמשו בה)\nביטול = שיתוף גיבוי נתונים (להעברת הדוחות שלך)");
  if(c)shareApp();else shareBackup();
}
function buildAppFile(){
  // יצירת עותק נקי של האפליקציה (ללא נתונים — הנתונים נשמרים בנפרד בכל מכשיר)
  const html=document.documentElement.cloneNode(true);
  const app=html.querySelector('#app');if(app)app.innerHTML='';
  return "<!DOCTYPE html>\n"+html.outerHTML;
}
async function shareFile(blob,filename,title,text){
  const file=new File([blob],filename,{type:blob.type});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title,text});}catch(e){/* בוטל ע"י המשתמש */}
    return true;
  }
  // נפילה חיננית: הורדה (למחשב/דפדפן ללא שיתוף)
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
  return false;
}
async function shareApp(){
  const blob=new Blob([buildAppFile()],{type:"text/html"});
  const ok=await shareFile(blob,"REPORTpro.html","REPORTpro · פיקוח עליון ובקרה הנדסית","REPORTpro — אפליקציית דוחות פיקוח. פתחו בדפדפן והוסיפו למסך הבית.");
  if(!ok)alert("האפליקציה הורדה כקובץ. שלחו אותו לעמיתים — הם יפתחו אותו בדפדפן ויוסיפו למסך הבית.");
}
async function downloadApp(){
  const blob=new Blob([buildAppFile()],{type:"text/html"});
  // בחירת מיקום שמירה אמיתית (נתמך ב-Chrome/Edge במחשב)
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:"REPORTpro.html",
        types:[{description:"קובץ HTML",accept:{"text/html":[".html"]}}]
      });
      const w=await handle.createWritable();
      await w.write(blob);await w.close();
      return;
    }catch(e){ if(e&&e.name==="AbortError")return; /* אם נכשל — נופל להורדה רגילה */ }
  }
  // הורדה רגילה (תיקיית ההורדות, או חלון בחירה אם מוגדר בדפדפן)
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="REPORTpro.html";a.click();URL.revokeObjectURL(a.href);
}
// ---------- שמירת דוח בודד כקובץ HTML עצמאי ----------
function safeName(s){return (s||"report").replace(/[\\/:*?"<>|\n\r\t]/g,"-").trim().slice(0,90);}
function buildReportFile(r){
  const docEl=document.getElementById("printDoc");
  if(!docEl)return null;
  const styleTag=document.querySelector("style").outerHTML;
  const fontLink='<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Rubik:wght@500;600;700;800&display=swap">';
  return '<!DOCTYPE html>\n<html lang="he" dir="rtl"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width, initial-scale=1.0">'
    +'<title>'+esc(r.title)+'</title>'+fontLink+styleTag+'</head>'
    +'<body style="background:#fff"><div style="max-width:760px;margin:0 auto;padding:20px">'
    +docEl.outerHTML+'</div></body></html>';
}
async function saveReportFile(){
  const r=state.current;
  const html=buildReportFile(r);
  if(!html){alert("לא ניתן להפיק את הקובץ. נסה שוב מתצוגת הדוח.");return;}
  const blob=new Blob([html],{type:"text/html"});
  const fname=safeName(r.title+" "+(r.date||""))+".html";
  if(window.showSaveFilePicker){
    try{
      const h=await window.showSaveFilePicker({suggestedName:fname,types:[{description:"קובץ HTML",accept:{"text/html":[".html"]}}]});
      const w=await h.createWritable();await w.write(blob);await w.close();return;
    }catch(e){ if(e&&e.name==="AbortError")return; }
  }
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;a.click();URL.revokeObjectURL(a.href);
}
async function shareBackup(){
  const data={reports:state.reports,folders:state.folders,templates:state.templates};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const ok=await shareFile(blob,"carmin-backup-"+new Date().toISOString().slice(0,10)+".json","גיבוי דוחות פיקוח","קובץ גיבוי — שחזרו אותו דרך כפתור 'שחזור' באפליקציה.");
  if(!ok)alert("הגיבוי הורד כקובץ. ניתן לשחזר אותו בכל מכשיר דרך כפתור 'שחזור'.");
}
document.getElementById("importInput").addEventListener("change",async e=>{
  const file=e.target.files[0];if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    const reports=Array.isArray(data)?data:(data.reports||[]);
    const folders=data.folders||[];const templates=data.templates||[];
    for(const r of reports)if(r&&r.id)await DB.put("reports",r);
    for(const f of folders)if(f&&f.id)await DB.put("folders",f);
    for(const t of templates)if(t&&t.id)await DB.put("templates",t);
    state.reports=await DB.all("reports");state.folders=await DB.all("folders");state.templates=await DB.all("templates");
    if(state.templates.length===0){const d=defaultTemplate();await DB.put("templates",d);state.templates=[d];}
    state.reports.sort((a,b)=>b.updatedAt-a.updatedAt);
    render();alert("השחזור הושלם: "+reports.length+" דוחות, "+folders.length+" תיקיות, "+templates.length+" תבניות.");
  }catch(err){alert("הקובץ אינו תקין.");}
  e.target.value="";
});

function showChangelog(){
  const lines=CHANGELOG.map(c=>`v${c.v} — ${c.d}`).join("\n");
  alert("REPORTpro · פיקוח עליון ובקרה הנדסית\nגרסה נוכחית: "+APP_VERSION+"\n\nהיסטוריית עדכונים:\n"+lines);
}

document.getElementById('verBtn').textContent="v"+APP_VERSION;
init();
